  <style>
    :root {
      --bg-primary: #FFFFFF;
      --bg-secondary: #F2F4F7;
      --text-primary: #1B4F72;
      --text-secondary: #5A6C7D;
      --border-color: #D1D5DB;
    }

    [data-theme="dark"] {
      --bg-primary: #0F1419;
      --bg-secondary: #1A1F2E;
      --text-primary: #E8EAF6;
      --text-secondary: #9CA3AF;
      --border-color: #374151;
    }

    body {
      background-color: var(--bg-secondary);
      color: var(--text-primary);
      transition: background-color 0.3s ease, color 0.3s ease;
    }

    [data-theme="dark"] .bg-gray-50 { background-color: #0F1419; }
    [data-theme="dark"] .bg-gray-100 { background-color: #1A1F2E; }
    [data-theme="dark"] .bg-white { background-color: #1A1F2E; }
    [data-theme="dark"] .text-gray-800 { color: #E8EAF6; }
    [data-theme="dark"] .text-gray-700 { color: #E8EAF6; }
    [data-theme="dark"] .text-gray-600 { color: #9CA3AF; }
    [data-theme="dark"] .text-gray-500 { color: #9CA3AF; }
    [data-theme="dark"] .border-gray-200 { border-color: #374151; }
    [data-theme="dark"] .border-gray-300 { border-color: #4b5563; }
    [data-theme="dark"] .shadow-lg { box-shadow: 0 10px 15px -3px rgba(0, 0, 0, 0.5); }
    [data-theme="dark"] .shadow-xl { box-shadow: 0 20px 25px -5px rgba(0, 0, 0, 0.5); }

    .dark-mode-toggle {
      position: fixed;
      bottom: 2rem;
      right: 2rem;
      z-index: 50;
      width: 56px;
      height: 56px;
      border-radius: 50%;
      background: #1B4F72;
      box-shadow: 0 10px 25px rgba(27, 79, 114, 0.5);
      display: flex;
      align-items: center;
      justify-content: center;
      cursor: pointer;
      transition: all 0.3s ease;
      color: white;
    }

    [data-theme="dark"] .dark-mode-toggle {
      background: #2E5C8A;
      box-shadow: 0 10px 25px rgba(46, 92, 138, 0.5);
    }

    .dark-mode-toggle:hover {
      transform: scale(1.1);
    }

    * {
      transition: background-color 0.3s ease, color 0.3s ease, border-color 0.3s ease;
    }

    .scheme-card {
      transition: all 0.3s ease;
    }

    .scheme-card:hover {
      transform: translateY(-8px);
      box-shadow: 0 20px 25px -5px rgba(0, 0, 0, 0.1);
    }

    @keyframes fadeInUp {
      from { opacity: 0; transform: translateY(20px); }
      to { opacity: 1; transform: translateY(0); }
    }

    .animate-fadeInUp {
      animation: fadeInUp 0.6s ease-out;
    }
  </style>
</head>

    // Color mapping
    const colorClasses = {
      blue: 'from-blue-500 to-blue-600',
      indigo: 'from-indigo-500 to-indigo-600',
      purple: 'from-purple-500 to-purple-600',
      green: 'from-green-500 to-green-600',
      teal: 'from-teal-500 to-teal-600',
      pink: 'from-pink-500 to-pink-600',
      rose: 'from-rose-500 to-rose-600',
      yellow: 'from-yellow-500 to-yellow-600',
      orange: 'from-orange-500 to-orange-600',
      red: 'from-red-500 to-red-600',
      lime: 'from-lime-500 to-lime-600',
      emerald: 'from-emerald-500 to-emerald-600',
      cyan: 'from-cyan-500 to-cyan-600',
      gray: 'from-gray-500 to-gray-600'
    };

    // Render schemes
    function renderSchemes(schemes) {
      const container = document.getElementById('schemesContainer');
      const noResults = document.getElementById('noResults');
      
      if (schemes.length === 0) {
        container.innerHTML = '';
        noResults.classList.remove('hidden');
        return;
      }
      
      noResults.classList.add('hidden');
      container.innerHTML = schemes.map(scheme => `
        <div class="scheme-card bg-white rounded-2xl shadow-lg overflow-hidden">
          <div class="bg-gradient-to-r ${colorClasses[scheme.color]} p-6 text-white">
            <div class="text-5xl mb-3">${scheme.icon}</div>
            <h3 class="text-xl font-bold mb-2">${scheme.name}</h3>
            <span class="inline-block bg-white/20 px-3 py-1 rounded-full text-xs font-semibold uppercase">
              ${scheme.category}
            </span>
          </div>
          <div class="p-6">
            <p class="text-gray-600 mb-4 text-sm leading-relaxed">${scheme.description}</p>
            <div class="mb-4">
              <p class="text-xs text-gray-500 mb-1">Benefits:</p>
              <p class="font-bold text-teal-600">${scheme.benefits}</p>
            </div>
            <div class="flex items-center justify-between">
              <span class="text-xs bg-gray-100 text-gray-700 px-3 py-1 rounded-full font-semibold">
                For: ${scheme.eligibility.charAt(0).toUpperCase() + scheme.eligibility.slice(1)}
              </span>
              <a href="${scheme.link}" target="_blank" class="inline-flex items-center gap-2 bg-teal-600 text-white px-4 py-2 rounded-lg hover:bg-teal-700 transition-all text-sm font-semibold">
                Apply Now
                <svg class="w-4 h-4" fill="currentColor" viewBox="0 0 20 20">
                  <path fill-rule="evenodd" d="M10.293 3.293a1 1 0 011.414 0l6 6a1 1 0 010 1.414l-6 6a1 1 0 01-1.414-1.414L14.586 11H3a1 1 0 110-2h11.586l-4.293-4.293a1 1 0 010-1.414z"/>
                </svg>
              </a>
            </div>
          </div>
        </div>
      `).join('');
    }

    // Filter schemes
    function filterSchemes() {
      const searchTerm = document.getElementById('searchInput').value.toLowerCase();
      const category = document.getElementById('categoryFilter').value;
      const eligibility = document.getElementById('eligibilityFilter').value;

      const filtered = schemesData.filter(scheme => {
        const matchesSearch = scheme.name.toLowerCase().includes(searchTerm) || 
                            scheme.description.toLowerCase().includes(searchTerm) ||
                            scheme.benefits.toLowerCase().includes(searchTerm);
        const matchesCategory = category === 'all' || scheme.category === category;
        const matchesEligibility = eligibility === 'all' || scheme.eligibility === eligibility;
        
        return matchesSearch && matchesCategory && matchesEligibility;
      });

      renderSchemes(filtered);
    }

    // Event listeners
    document.getElementById('searchInput').addEventListener('input', filterSchemes);
    document.getElementById('categoryFilter').addEventListener('change', filterSchemes);
    document.getElementById('eligibilityFilter').addEventListener('change', filterSchemes);

    // Dark Mode Toggle
    const darkModeToggle = document.getElementById('darkModeToggle');
    const sunIcon = document.getElementById('sunIcon');
    const moonIcon = document.getElementById('moonIcon');
    const htmlElement = document.documentElement;
    const currentTheme = localStorage.getItem('theme') || 'light';
    
    if (currentTheme === 'dark') {
      htmlElement.setAttribute('data-theme', 'dark');
      sunIcon.classList.add('hidden');
      moonIcon.classList.remove('hidden');
    }

    darkModeToggle.addEventListener('click', function() {
      if (htmlElement.getAttribute('data-theme') === 'dark') {
        htmlElement.removeAttribute('data-theme');
        localStorage.setItem('theme', 'light');
        sunIcon.classList.remove('hidden');
        moonIcon.classList.add('hidden');
      } else {
        htmlElement.setAttribute('data-theme', 'dark');
        localStorage.setItem('theme', 'dark');
        sunIcon.classList.add('hidden');
        moonIcon.classList.remove('hidden');
      }
    });

    // Initial render
    renderSchemes(schemesData);
  </script>
</body>
</html>
