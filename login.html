<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Login | Gov E-Services</title>

  <script src="https://cdn.tailwindcss.com"></script>
</head>

<body class="bg-gradient-to-r from-indigo-600 to-blue-500 min-h-screen flex items-center justify-center">

  <div class="bg-white p-8 rounded-xl shadow-lg w-full max-w-md">

    <h2 class="text-2xl font-bold text-center text-indigo-700 mb-6">
      Login to Your Account
    </h2>

    <form id="loginForm">

      <!-- Error/Success Message -->
      <div id="message" class="mb-4 p-3 rounded hidden"></div>

      <!-- Mobile / Email -->
      <div class="mb-4">
        <label class="block mb-1 font-medium">Mobile / Email</label>
        <input
          type="text"
          id="email"
          name="email"
          placeholder="Enter mobile or email"
          class="w-full border px-4 py-2 rounded focus:ring-2 focus:ring-indigo-500"
          required
        />
      </div>

      <!-- Password -->
      <div class="mb-4">
        <label class="block mb-1 font-medium">Password</label>
        <input
          type="password"
          id="password"
          name="password"
          placeholder="Enter password"
          class="w-full border px-4 py-2 rounded focus:ring-2 focus:ring-indigo-500"
          required
        />
      </div>

      <!-- Remember -->
      <div class="flex items-center justify-between mb-4 text-sm">
        <label class="flex items-center gap-2">
          <input type="checkbox" id="remember" />
          Remember me
        </label>

        <a href="#" class="text-indigo-600 hover:underline">
          Forgot Password?
        </a>
      </div>

      <!-- Button -->
      <button
        type="submit"
        id="loginBtn"
        class="w-full bg-indigo-700 text-white py-2 rounded-lg hover:bg-indigo-800 font-semibold"
      >
        Login
      </button>

    </form>

    <script>
      document.getElementById('loginForm').addEventListener('submit', async (e) => {
        e.preventDefault();
        
        const btn = document.getElementById('loginBtn');
        const message = document.getElementById('message');
        
        // Disable button
        btn.disabled = true;
        btn.textContent = 'Logging in...';
        
        // Get form data
        const formData = {
          email: document.getElementById('email').value,
          password: document.getElementById('password').value
        };
        
        try {
          const response = await fetch('./api/login_handler.php', {
            method: 'POST',
            headers: {
              'Content-Type': 'application/json'
            },
            body: JSON.stringify(formData)
          });
          
          const data = await response.json();
          
          if (data.success) {
            // Show success message
            message.className = 'mb-4 p-3 rounded bg-green-100 text-green-700';
            message.textContent = data.message;
            message.classList.remove('hidden');
            
            // Store user data
            localStorage.setItem('user', JSON.stringify(data.data.user));
            
            // Redirect based on role
            setTimeout(() => {
              if (data.data.user.role === 'admin') {
                window.location.href = 'admin_panel.html';
              } else {
                window.location.href = 'user_dashboard.html';
              }
            }, 1000);
          } else {
            // Show error message
            message.className = 'mb-4 p-3 rounded bg-red-100 text-red-700';
            message.textContent = data.message;
            message.classList.remove('hidden');
            
            btn.disabled = false;
            btn.textContent = 'Login';
          }
        } catch (error) {
          message.className = 'mb-4 p-3 rounded bg-red-100 text-red-700';
          message.textContent = 'Connection error. Please check if XAMPP is running.';
          message.classList.remove('hidden');
          
          btn.disabled = false;
          btn.textContent = 'Login';
        }
      });
    </script>

    <!-- Register -->
    <p class="text-center mt-5 text-sm">
      Don't have an account?
      <a href="signup.html" class="text-indigo-600 font-semibold hover:underline">
        Register
      </a>
    </p>

  </div>

</body>
</html>
