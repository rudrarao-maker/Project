<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Services & Schemes Portal | Gov E-Services</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  <script src="https://cdn.tailwindcss.com"></script>
  <style>
    body { font-family: 'Inter', sans-serif; }
    .card-hover { transition: all 0.3s ease; }
    .card-hover:hover { transform: translateY(-5px); box-shadow: 0 20px 25px -5px rgba(0, 0, 0, 0.1); }
    .tab-content { display: none; }
    .tab-content.active { display: block; }
  </style>
</head>
<body class="bg-gray-50">

  <!-- Header -->
  <header class="bg-indigo-700 text-white sticky top-0 z-50 shadow-lg">
    <div class="container mx-auto flex items-center justify-between p-4">
      <div class="flex items-center gap-3">
        <img src="img/National-Emblem.png" class="h-10" alt="Logo" />
        <h1 class="text-lg md:text-xl font-bold">Gov E-Services Portal</h1>
      </div>
      <a href="Main.html" class="bg-white text-indigo-700 px-4 py-2 rounded-lg font-semibold hover:bg-gray-200 transition-all">
        ← Back to Home
      </a>
    </div>
  </header>

  <!-- Navigation Tabs -->
  <div class="bg-white shadow-md sticky top-16 z-40">
    <div class="container mx-auto px-6">
      <div class="flex overflow-x-auto">
        <button onclick="switchTab('services')" class="tab-btn px-6 py-4 font-semibold border-b-2 border-indigo-600 text-indigo-600" data-tab="services">
          🏛️ All Services
        </button>
        <button onclick="switchTab('schemes')" class="tab-btn px-6 py-4 font-semibold text-gray-600 hover:text-indigo-600" data-tab="schemes">
          🎯 All Schemes
        </button>
        <button onclick="switchTab('states')" class="tab-btn px-6 py-4 font-semibold text-gray-600 hover:text-indigo-600" data-tab="states">
          🗺️ State Services
        </button>
      </div>
    </div>
  </div>

  <!-- Services Tab -->
  <div id="services-tab" class="tab-content active">
    <section class="bg-gradient-to-r from-indigo-600 to-purple-600 text-white py-16">
      <div class="container mx-auto px-6 text-center">
        <h1 class="text-4xl md:text-5xl font-bold mb-4">All Government Services</h1>
        <p class="text-xl text-indigo-100 mb-8">Access 50+ essential government services from one place</p>
        
        <div class="max-w-2xl mx-auto">
          <div class="relative">
            <input 
              type="text" 
              id="searchServices"
              placeholder="Search for services (e.g., Aadhaar, Passport, PAN Card...)" 
              class="w-full px-6 py-4 rounded-xl text-gray-800 text-lg focus:outline-none focus:ring-4 focus:ring-indigo-300"
              onkeyup="filterItems('services')"
            />
            <svg class="absolute right-4 top-4 w-6 h-6 text-gray-400" fill="currentColor" viewBox="0 0 20 20">
              <path fill-rule="evenodd" d="M8 4a4 4 0 100 8 4 4 0 000-8zM2 8a6 6 0 1110.89 3.476l4.817 4.817a1 1 0 01-1.414 1.414l-4.816-4.816A6 6 0 012 8z"/>
            </svg>
          </div>
        </div>
      </div>
    </section>

    <div class="container mx-auto px-6 py-12">
      <div id="servicesGrid" class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-6"></div>
    </div>
  </div>

  <!-- Schemes Tab -->
  <div id="schemes-tab" class="tab-content">
    <section class="bg-gradient-to-r from-green-600 to-teal-600 text-white py-16">
      <div class="container mx-auto px-6 text-center">
        <h1 class="text-4xl md:text-5xl font-bold mb-4">All Government Schemes</h1>
        <p class="text-xl text-green-100 mb-8">Explore 40+ welfare schemes for citizens across India</p>
        
        <div class="max-w-2xl mx-auto">
          <div class="relative">
            <input 
              type="text" 
              id="searchSchemes"
              placeholder="Search for schemes (e.g., PM Kisan, Ayushman Bharat...)" 
              class="w-full px-6 py-4 rounded-xl text-gray-800 text-lg focus:outline-none focus:ring-4 focus:ring-green-300"
              onkeyup="filterItems('schemes')"
            />
            <svg class="absolute right-4 top-4 w-6 h-6 text-gray-400" fill="currentColor" viewBox="0 0 20 20">
              <path fill-rule="evenodd" d="M8 4a4 4 0 100 8 4 4 0 000-8zM2 8a6 6 0 1110.89 3.476l4.817 4.817a1 1 0 01-1.414 1.414l-4.816-4.816A6 6 0 012 8z"/>
            </svg>
          </div>
        </div>
      </div>
    </section>

    <div class="container mx-auto px-6 py-12">
      <div id="schemesGrid" class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-6"></div>
    </div>
  </div>

  <!-- States Tab -->
  <div id="states-tab" class="tab-content">
    <section class="bg-gradient-to-r from-blue-600 to-indigo-600 text-white py-16">
      <div class="container mx-auto px-6 text-center">
        <h1 class="text-4xl md:text-5xl font-bold mb-4">State-Specific Services</h1>
        <p class="text-xl text-blue-100 mb-8">Select your state to view local services and schemes</p>
      </div>
    </section>

    <div class="container mx-auto px-6 py-12">
      <div id="statesGrid" class="grid grid-cols-2 md:grid-cols-3 lg:grid-cols-4 gap-6"></div>
    </div>
  </div>

  <script>
    const services = [
      { name: 'Aadhaar Card', icon: '🆔', category: 'Identity', description: 'Apply for Aadhaar card', link: 'services.html' },
      { name: 'PAN Card', icon: '💳', category: 'Tax', description: 'Apply for PAN card', link: 'services.html' },
      { name: 'Passport', icon: '🛂', category: 'Travel', description: 'Apply for passport', link: 'services.html' },
      { name: 'Driving License', icon: '🚗', category: 'Transport', description: 'Apply for driving license', link: 'services.html' },
      { name: 'Voter ID', icon: '🗳️', category: 'Election', description: 'Apply for voter ID', link: 'services.html' },
      { name: 'Birth Certificate', icon: '👶', category: 'Certificate', description: 'Get birth certificate', link: 'services.html' },
      { name: 'Income Certificate', icon: '📄', category: 'Certificate', description: 'Apply for income certificate', link: 'services.html' },
      { name: 'Ration Card', icon: '🍚', category: 'Welfare', description: 'Apply for ration card', link: 'services.html' }
    ];

    const schemes = [
      { name: 'PM Kisan Samman Nidhi', icon: '🌾', category: 'Agriculture', description: 'Financial support for farmers', link: 'all_schemes.html' },
      { name: 'Ayushman Bharat', icon: '🏥', category: 'Health', description: 'Health insurance scheme', link: 'all_schemes.html' },
      { name: 'PM Awas Yojana', icon: '🏠', category: 'Housing', description: 'Housing for all', link: 'all_schemes.html' },
      { name: 'Sukanya Samriddhi Yojana', icon: '👧', category: 'Women', description: 'Savings scheme for girl child', link: 'all_schemes.html' },
      { name: 'PM Mudra Yojana', icon: '💼', category: 'Business', description: 'Loans for small businesses', link: 'all_schemes.html' },
      { name: 'Pradhan Mantri Jan Dhan Yojana', icon: '🏦', category: 'Banking', description: 'Financial inclusion', link: 'all_schemes.html' }
    ];

    const states = [
      { name: 'Maharashtra', icon: 'img/states/Maharashtra.png' },
      { name: 'Gujarat', icon: 'img/states/Gujarat.png' },
      { name: 'Karnataka', icon: 'img/states/Karnataka.png' },
      { name: 'Tamil Nadu', icon: 'img/states/Tamil_Nadu.png' },
      { name: 'Uttar Pradesh', icon: 'img/states/Uttar_Pradesh.png' },
      { name: 'West Bengal', icon: 'img/states/West_Bengal.png' },
      { name: 'Rajasthan', icon: 'img/states/Rajasthan.png' },
      { name: 'Delhi', icon: 'img/states/Delhi.png' }
    ];

    function switchTab(tabName) {
      document.querySelectorAll('.tab-content').forEach(tab => tab.classList.remove('active'));
      document.querySelectorAll('.tab-btn').forEach(btn => {
        btn.classList.remove('border-indigo-600', 'text-indigo-600');
        btn.classList.add('text-gray-600');
      });
      
      document.getElementById(tabName + '-tab').classList.add('active');
      document.querySelector(`[data-tab="${tabName}"]`).classList.add('border-indigo-600', 'text-indigo-600');
      document.querySelector(`[data-tab="${tabName}"]`).classList.remove('text-gray-600');
    }

    function renderServices() {
      const grid = document.getElementById('servicesGrid');
      grid.innerHTML = services.map(service => `
        <div class="card-hover bg-white rounded-xl shadow-lg p-6 cursor-pointer" onclick="window.location.href='${service.link}'">
          <div class="text-5xl mb-4">${service.icon}</div>
          <h3 class="text-xl font-bold text-gray-800 mb-2">${service.name}</h3>
          <p class="text-sm text-gray-600 mb-3">${service.description}</p>
          <span class="inline-block bg-indigo-100 text-indigo-800 text-xs px-3 py-1 rounded-full">${service.category}</span>
        </div>
      `).join('');
    }

    function renderSchemes() {
      const grid = document.getElementById('schemesGrid');
      grid.innerHTML = schemes.map(scheme => `
        <div class="card-hover bg-white rounded-xl shadow-lg p-6 cursor-pointer" onclick="window.location.href='${scheme.link}'">
          <div class="text-5xl mb-4">${scheme.icon}</div>
          <h3 class="text-xl font-bold text-gray-800 mb-2">${scheme.name}</h3>
          <p class="text-sm text-gray-600 mb-3">${scheme.description}</p>
          <span class="inline-block bg-green-100 text-green-800 text-xs px-3 py-1 rounded-full">${scheme.category}</span>
        </div>
      `).join('');
    }

    function renderStates() {
      const grid = document.getElementById('statesGrid');
      grid.innerHTML = states.map(state => `
        <div class="card-hover bg-white rounded-xl shadow-lg p-6 text-center cursor-pointer" onclick="window.location.href='state_services.html?state=${state.name}'">
          <img src="${state.icon}" alt="${state.name}" class="w-24 h-24 mx-auto mb-4 object-contain">
          <h3 class="text-lg font-bold text-gray-800">${state.name}</h3>
        </div>
      `).join('');
    }

    function filterItems(type) {
      const searchInput = document.getElementById(`search${type.charAt(0).toUpperCase() + type.slice(1)}`).value.toLowerCase();
      const items = type === 'services' ? services : schemes;
      const grid = document.getElementById(`${type}Grid`);
      
      const filtered = items.filter(item => 
        item.name.toLowerCase().includes(searchInput) || 
        item.description.toLowerCase().includes(searchInput) ||
        item.category.toLowerCase().includes(searchInput)
      );
      
      grid.innerHTML = filtered.map(item => `
        <div class="card-hover bg-white rounded-xl shadow-lg p-6 cursor-pointer" onclick="window.location.href='${item.link}'">
          <div class="text-5xl mb-4">${item.icon}</div>
          <h3 class="text-xl font-bold text-gray-800 mb-2">${item.name}</h3>
          <p class="text-sm text-gray-600 mb-3">${item.description}</p>
          <span class="inline-block ${type === 'services' ? 'bg-indigo-100 text-indigo-800' : 'bg-green-100 text-green-800'} text-xs px-3 py-1 rounded-full">${item.category}</span>
        </div>
      `).join('');
    }

    // Initialize
    renderServices();
    renderSchemes();
    renderStates();
  </script>
</body>
</html>
