  <style>
    /* Government Portal Theme */
    :root {
      --bg-primary: #FFFFFF;
      --bg-secondary: #F2F4F7;
      --text-primary: #1B4F72;
      --text-secondary: #5A6C7D;
      --button-primary: #1B4F72;
      --button-hover: #154360;
      --border-color: #D5DBDB;
    }

    [data-theme="dark"] {
      --bg-primary: #0F1419;
      --bg-secondary: #1A1F2E;
      --text-primary: #E8EAF6;
      --text-secondary: #9CA3AF;
      --button-primary: #2E5C8A;
      --button-hover: #3A7BC8;
      --border-color: #374151;
    }

    body {
      font-family: 'Poppins', sans-serif;
      background-color: var(--bg-secondary);
      color: var(--text-primary);
      transition: all 0.3s ease;
    }

    /* Service Card Styles */
    .service-card {
      background: var(--bg-primary);
      border: 1px solid var(--border-color);
      border-radius: 12px;
      padding: 24px;
      transition: all 0.3s ease;
      cursor: pointer;
      position: relative;
      overflow: hidden;
    }

    .service-card::before {
      content: '';
      position: absolute;
      top: 0;
      left: 0;
      width: 4px;
      height: 100%;
      background: var(--button-primary);
      transform: scaleY(0);
      transition: transform 0.3s ease;
    }

    .service-card:hover {
      transform: translateY(-8px);
      box-shadow: 0 20px 40px rgba(0, 0, 0, 0.1);
    }

    .service-card:hover::before {
      transform: scaleY(1);
    }

    [data-theme="dark"] .service-card:hover {
      box-shadow: 0 20px 40px rgba(0, 0, 0, 0.5);
    }

    /* Category Badge */
    .category-badge {
      display: inline-block;
      padding: 6px 16px;
      border-radius: 20px;
      font-size: 12px;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.5px;
    }

    .badge-identity { background: #E3F2FD; color: #1565C0; }
    .badge-certificates { background: #F3E5F5; color: #6A1B9A; }
    .badge-schemes { background: #E8F5E9; color: #2E7D32; }
    .badge-education { background: #FFF3E0; color: #E65100; }
    .badge-employment { background: #FCE4EC; color: #C2185B; }
    .badge-health { background: #E0F2F1; color: #00695C; }
    .badge-finance { background: #FFF9C4; color: #F57F17; }
    .badge-utilities { background: #E1F5FE; color: #0277BD; }

    [data-theme="dark"] .badge-identity { background: #1565C0; color: #E3F2FD; }
    [data-theme="dark"] .badge-certificates { background: #6A1B9A; color: #F3E5F5; }
    [data-theme="dark"] .badge-schemes { background: #2E7D32; color: #E8F5E9; }
    [data-theme="dark"] .badge-education { background: #E65100; color: #FFF3E0; }
    [data-theme="dark"] .badge-employment { background: #C2185B; color: #FCE4EC; }
    [data-theme="dark"] .badge-health { background: #00695C; color: #E0F2F1; }
    [data-theme="dark"] .badge-finance { background: #F57F17; color: #FFF9C4; }
    [data-theme="dark"] .badge-utilities { background: #0277BD; color: #E1F5FE; }

    /* Search Bar */
    .search-container {
      position: relative;
      max-width: 600px;
      margin: 0 auto;
    }

    /* Filter Buttons */
    .filter-btn {
      padding: 10px 20px;
      border-radius: 25px;
      border: 2px solid var(--border-color);
      background: var(--bg-primary);
      color: var(--text-primary);
      font-weight: 600;
      transition: all 0.3s ease;
      cursor: pointer;
    }

    .filter-btn:hover, .filter-btn.active {
      background: var(--button-primary);
      color: white;
      border-color: var(--button-primary);
    }

    /* Dark Mode Toggle */
    .dark-mode-toggle {
      position: fixed;
      bottom: 2rem;
      right: 2rem;
      z-index: 50;
      width: 56px;
      height: 56px;
      border-radius: 50%;
      background: var(--button-primary);
      box-shadow: 0 10px 25px rgba(0, 0, 0, 0.2);
      display: flex;
      align-items: center;
      justify-content: center;
      cursor: pointer;
      transition: all 0.3s ease;
      color: white;
    }

    .dark-mode-toggle:hover {
      transform: scale(1.1);
    }

    /* Animations */
    @keyframes fadeInUp {
      from {
        opacity: 0;
        transform: translateY(30px);
      }
      to {
        opacity: 1;
        transform: translateY(0);
      }
    }

    .animate-fadeInUp {
      animation: fadeInUp 0.6s ease-out;
    }

    /* Stats Counter */
    .stat-card {
      background: linear-gradient(135deg, var(--button-primary), var(--button-hover));
      color: white;
      border-radius: 12px;
      padding: 24px;
      text-align: center;
    }

    /* Responsive */
    @media (max-width: 768px) {
      .service-card {
        padding: 16px;
      }
      
      .filter-btn {
        padding: 8px 16px;
        font-size: 14px;
      }
    }
  </style>

    // Display Services
    function displayServices(servicesToShow) {
      const container = document.getElementById('servicesContainer');
      const noResults = document.getElementById('noResults');

      if (servicesToShow.length === 0) {
        container.innerHTML = '';
        noResults.classList.remove('hidden');
        return;
      }

      noResults.classList.add('hidden');

      container.innerHTML = servicesToShow.map(service => `
        <div class="service-card" onclick="window.location.href='${service.link}'">
          <div class="flex items-start justify-between mb-4">
            <div class="w-12 h-12 rounded-lg flex items-center justify-center text-2xl" style="background: var(--bg-secondary);">
              <i class="fas ${service.icon}" style="color: var(--button-primary);"></i>
            </div>
            ${service.popular ? '<span class="category-badge" style="background: #FFD700; color: #000;">⭐ Popular</span>' : ''}
          </div>
          
          <h3 class="text-xl font-bold mb-2">${service.name}</h3>
          <p class="text-sm mb-4" style="color: var(--text-secondary);">${service.description}</p>
          
          <div class="flex items-center justify-between">
            <span class="category-badge badge-${service.category}">${service.category}</span>
            <i class="fas fa-arrow-right" style="color: var(--button-primary);"></i>
          </div>
        </div>
      `).join('');
    }

    // Filter Services
    let currentFilter = 'all';
    function filterServices(category) {
      currentFilter = category;
      
      // Update active button
      document.querySelectorAll('.filter-btn').forEach(btn => {
        btn.classList.remove('active');
      });
      event.target.closest('.filter-btn').classList.add('active');

      // Filter and display
      const filtered = category === 'all' 
        ? services 
        : services.filter(s => s.category === category);
      
      displayServices(filtered);
    }

    // Search Services
    function searchServices() {
      const searchTerm = document.getElementById('serviceSearch').value.toLowerCase();
      
      let filtered = currentFilter === 'all' 
        ? services 
        : services.filter(s => s.category === currentFilter);

      if (searchTerm) {
        filtered = filtered.filter(service => 
          service.name.toLowerCase().includes(searchTerm) ||
          service.description.toLowerCase().includes(searchTerm) ||
          service.category.toLowerCase().includes(searchTerm)
        );
      }

      displayServices(filtered);
    }

    // Dark Mode
    const darkModeToggle = document.getElementById('darkModeToggle');
    const html = document.documentElement;
    
    if (localStorage.getItem('theme') === 'dark') {
      html.setAttribute('data-theme', 'dark');
      darkModeToggle.innerHTML = '<i class="fas fa-sun text-xl"></i>';
    }
    
    darkModeToggle.addEventListener('click', () => {
      if (html.getAttribute('data-theme') === 'dark') {
        html.removeAttribute('data-theme');
        localStorage.setItem('theme', 'light');
        darkModeToggle.innerHTML = '<i class="fas fa-moon text-xl"></i>';
      } else {
        html.setAttribute('data-theme', 'dark');
        localStorage.setItem('theme', 'dark');
        darkModeToggle.innerHTML = '<i class="fas fa-sun text-xl"></i>';
      }
    });

    // Initialize
    displayServices(services);
  </script>

</body>
</html>
