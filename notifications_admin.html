<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Notification Management - Admin Panel</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root {
            --bg-primary: #FFFFFF;
            --bg-secondary: #F2F4F7;
            --text-primary: #1B4F72;
            --text-secondary: #5A6C7D;
            --border-color: #D1D5DB;
        }
        
        [data-theme="dark"] {
            --bg-primary: #0F1419;
            --bg-secondary: #1A1F2E;
            --text-primary: #E8EAF6;
            --text-secondary: #9CA3AF;
            --border-color: #374151;
        }
        
        body {
            background: var(--bg-secondary);
            color: var(--text-primary);
            transition: all 0.3s ease;
        }
        
        .card {
            background: var(--bg-primary);
            border: 1px solid var(--border-color);
            transition: all 0.3s ease;
        }
        
        .btn-primary {
            background: #1B4F72;
            color: white;
        }
        
        [data-theme="dark"] .btn-primary {
            background: #2E5C8A;
        }
        
        .status-sent { color: #10B981; }
        .status-failed { color: #EF4444; }
        .type-email { color: #3B82F6; }
        .type-sms { color: #8B5CF6; }
    </style>
</head>
<body>
    <!-- Header -->
    <header class="card shadow-md mb-6">
        <div class="container mx-auto px-6 py-4">
            <div class="flex justify-between items-center">
                <div class="flex items-center space-x-4">
                    <a href="admin_panel.html" class="text-2xl hover:opacity-80">
                        <i class="fas fa-arrow-left"></i>
                    </a>
                    <h1 class="text-2xl font-bold">Notification Management</h1>
                </div>
                <button id="darkModeToggle" class="p-2 rounded-lg hover:bg-gray-100 dark:hover:bg-gray-700">
                    <i class="fas fa-moon text-xl"></i>
                </button>
            </div>
        </div>
    </header>

    <div class="container mx-auto px-6 py-8">
        <!-- Statistics Cards -->
        <div class="grid grid-cols-1 md:grid-cols-5 gap-6 mb-8">
            <div class="card rounded-lg shadow-md p-6">
                <div class="flex items-center justify-between">
                    <div>
                        <p class="text-sm" style="color: var(--text-secondary)">Total Notifications</p>
                        <h3 class="text-3xl font-bold mt-2" id="totalNotifications">0</h3>
                    </div>
                    <i class="fas fa-bell text-4xl opacity-20"></i>
                </div>
            </div>
            
            <div class="card rounded-lg shadow-md p-6">
                <div class="flex items-center justify-between">
                    <div>
                        <p class="text-sm" style="color: var(--text-secondary)">Emails Sent</p>
                        <h3 class="text-3xl font-bold mt-2 type-email" id="totalEmails">0</h3>
                    </div>
                    <i class="fas fa-envelope text-4xl opacity-20"></i>
                </div>
            </div>
            
            <div class="card rounded-lg shadow-md p-6">
                <div class="flex items-center justify-between">
                    <div>
                        <p class="text-sm" style="color: var(--text-secondary)">SMS Sent</p>
                        <h3 class="text-3xl font-bold mt-2 type-sms" id="totalSMS">0</h3>
                    </div>
                    <i class="fas fa-sms text-4xl opacity-20"></i>
                </div>
            </div>
            
            <div class="card rounded-lg shadow-md p-6">
                <div class="flex items-center justify-between">
                    <div>
                        <p class="text-sm" style="color: var(--text-secondary)">Successful</p>
                        <h3 class="text-3xl font-bold mt-2 status-sent" id="totalSent">0</h3>
                    </div>
                    <i class="fas fa-check-circle text-4xl opacity-20"></i>
                </div>
            </div>
            
            <div class="card rounded-lg shadow-md p-6">
                <div class="flex items-center justify-between">
                    <div>
                        <p class="text-sm" style="color: var(--text-secondary)">Failed</p>
                        <h3 class="text-3xl font-bold mt-2 status-failed" id="totalFailed">0</h3>
                    </div>
                    <i class="fas fa-times-circle text-4xl opacity-20"></i>
                </div>
            </div>
        </div>

        <!-- Filters and Test Section -->
        <div class="card rounded-lg shadow-md p-6 mb-8">
            <div class="grid grid-cols-1 md:grid-cols-4 gap-4 mb-4">
                <div>
                    <label class="block text-sm font-medium mb-2">Type</label>
                    <select id="filterType" class="w-full px-4 py-2 rounded-lg border" style="background: var(--bg-primary); border-color: var(--border-color)">
                        <option value="">All Types</option>
                        <option value="email">Email</option>
                        <option value="sms">SMS</option>
                    </select>
                </div>
                
                <div>
                    <label class="block text-sm font-medium mb-2">Status</label>
                    <select id="filterStatus" class="w-full px-4 py-2 rounded-lg border" style="background: var(--bg-primary); border-color: var(--border-color)">
                        <option value="">All Status</option>
                        <option value="sent">Sent</option>
                        <option value="failed">Failed</option>
                    </select>
                </div>
                
                <div>
                    <label class="block text-sm font-medium mb-2">User ID</label>
                    <input type="number" id="filterUserId" placeholder="Enter User ID" class="w-full px-4 py-2 rounded-lg border" style="background: var(--bg-primary); border-color: var(--border-color)">
                </div>
                
                <div class="flex items-end">
                    <button onclick="applyFilters()" class="btn-primary px-6 py-2 rounded-lg w-full">
                        <i class="fas fa-filter mr-2"></i>Apply Filters
                    </button>
                </div>
            </div>
            
            <div class="flex gap-4">
                <button onclick="showTestEmailModal()" class="btn-primary px-6 py-2 rounded-lg">
                    <i class="fas fa-envelope mr-2"></i>Test Email
                </button>
                <button onclick="showTestSMSModal()" class="btn-primary px-6 py-2 rounded-lg">
                    <i class="fas fa-sms mr-2"></i>Test SMS
                </button>
            </div>
        </div>

        <!-- Notifications Table -->
        <div class="card rounded-lg shadow-md p-6">
            <h2 class="text-xl font-bold mb-4">Notification History</h2>
            <div class="overflow-x-auto">
                <table class="w-full">
                    <thead>
                        <tr class="border-b" style="border-color: var(--border-color)">
                            <th class="text-left py-3 px-4">ID</th>
                            <th class="text-left py-3 px-4">Type</th>
                            <th class="text-left py-3 px-4">Recipient</th>
                            <th class="text-left py-3 px-4">Subject/Message</th>
                            <th class="text-left py-3 px-4">Status</th>
                            <th class="text-left py-3 px-4">Sent At</th>
                            <th class="text-left py-3 px-4">Actions</th>
                        </tr>
                    </thead>
                    <tbody id="notificationsTable">
                        <tr>
                            <td colspan="7" class="text-center py-8" style="color: var(--text-secondary)">
                                <i class="fas fa-spinner fa-spin text-3xl mb-2"></i>
                                <p>Loading notifications...</p>
                            </td>
                        </tr>
                    </tbody>
                </table>
            </div>
            
            <!-- Pagination -->
            <div class="flex justify-between items-center mt-6">
                <button id="prevBtn" onclick="previousPage()" class="btn-primary px-4 py-2 rounded-lg" disabled>
                    <i class="fas fa-chevron-left mr-2"></i>Previous
                </button>
                <span id="pageInfo">Page 1</span>
                <button id="nextBtn" onclick="nextPage()" class="btn-primary px-4 py-2 rounded-lg">
                    Next<i class="fas fa-chevron-right ml-2"></i>
                </button>
            </div>
        </div>
    </div>

    <!-- Test Email Modal -->
    <div id="testEmailModal" class="fixed inset-0 bg-black bg-opacity-50 hidden items-center justify-center z-50">
        <div class="card rounded-lg p-8 max-w-md w-full mx-4">
            <h3 class="text-2xl font-bold mb-4">Send Test Email</h3>
            <div class="space-y-4">
                <div>
                    <label class="block text-sm font-medium mb-2">Email Type</label>
                    <select id="testEmailType" class="w-full px-4 py-2 rounded-lg border" style="background: var(--bg-primary); border-color: var(--border-color)">
                        <option value="registration">Registration</option>
                        <option value="application_submitted">Application Submitted</option>
                        <option value="status_approved">Status Approved</option>
                        <option value="status_rejected">Status Rejected</option>
                        <option value="status_review">Status Under Review</option>
                        <option value="appointment">Appointment</option>
                    </select>
                </div>
                <div>
                    <label class="block text-sm font-medium mb-2">Recipient Email</label>
                    <input type="email" id="testEmailRecipient" placeholder="test@example.com" class="w-full px-4 py-2 rounded-lg border" style="background: var(--bg-primary); border-color: var(--border-color)">
                </div>
                <div class="flex gap-4">
                    <button onclick="sendTestEmail()" class="btn-primary px-6 py-2 rounded-lg flex-1">
                        <i class="fas fa-paper-plane mr-2"></i>Send
                    </button>
                    <button onclick="closeTestEmailModal()" class="px-6 py-2 rounded-lg border flex-1" style="border-color: var(--border-color)">
                        Cancel
                    </button>
                </div>
            </div>
        </div>
    </div>

    <!-- Test SMS Modal -->
    <div id="testSMSModal" class="fixed inset-0 bg-black bg-opacity-50 hidden items-center justify-center z-50">
        <div class="card rounded-lg p-8 max-w-md w-full mx-4">
            <h3 class="text-2xl font-bold mb-4">Send Test SMS</h3>
            <div class="space-y-4">
                <div>
                    <label class="block text-sm font-medium mb-2">SMS Type</label>
                    <select id="testSMSType" class="w-full px-4 py-2 rounded-lg border" style="background: var(--bg-primary); border-color: var(--border-color)">
                        <option value="registration">Registration</option>
                        <option value="application_submitted">Application Submitted</option>
                        <option value="status_approved">Status Approved</option>
                        <option value="status_rejected">Status Rejected</option>
                        <option value="status_review">Status Under Review</option>
                        <option value="appointment">Appointment</option>
                        <option value="appointment_reminder">Appointment Reminder</option>
                        <option value="document_required">Document Required</option>
                        <option value="otp">OTP</option>
                    </select>
                </div>
                <div>
                    <label class="block text-sm font-medium mb-2">Recipient Phone (10 digits)</label>
                    <input type="tel" id="testSMSRecipient" placeholder="9876543210" maxlength="10" class="w-full px-4 py-2 rounded-lg border" style="background: var(--bg-primary); border-color: var(--border-color)">
                </div>
                <div class="flex gap-4">
                    <button onclick="sendTestSMS()" class="btn-primary px-6 py-2 rounded-lg flex-1">
                        <i class="fas fa-paper-plane mr-2"></i>Send
                    </button>
                    <button onclick="closeTestSMSModal()" class="px-6 py-2 rounded-lg border flex-1" style="border-color: var(--border-color)">
                        Cancel
                    </button>
                </div>
            </div>
        </div>
    </div>

    <script>
        let currentPage = 1;
        let totalPages = 1;
        const limit = 20;

        // Dark Mode
        const darkModeToggle = document.getElementById('darkModeToggle');
        const html = document.documentElement;
        
        if (localStorage.getItem('theme') === 'dark') {
            html.setAttribute('data-theme', 'dark');
            darkModeToggle.innerHTML = '<i class="fas fa-sun text-xl"></i>';
        }
        
        darkModeToggle.addEventListener('click', () => {
            if (html.getAttribute('data-theme') === 'dark') {
                html.removeAttribute('data-theme');
                localStorage.setItem('theme', 'light');
                darkModeToggle.innerHTML = '<i class="fas fa-moon text-xl"></i>';
            } else {
                html.setAttribute('data-theme', 'dark');
                localStorage.setItem('theme', 'dark');
                darkModeToggle.innerHTML = '<i class="fas fa-sun text-xl"></i>';
            }
        });

        // Load notifications
        function loadNotifications() {
            const type = document.getElementById('filterType').value;
            const status = document.getElementById('filterStatus').value;
            const userId = document.getElementById('filterUserId').value;
            const offset = (currentPage - 1) * limit;
            
            let url = `api/get_notifications.php?limit=${limit}&offset=${offset}`;
            if (type) url += `&type=${type}`;
            if (status) url += `&status=${status}`;
            if (userId) url += `&user_id=${userId}`;
            
            fetch(url)
                .then(res => res.json())
                .then(data => {
                    if (data.success) {
                        updateStatistics(data.stats);
                        displayNotifications(data.notifications);
                        updatePagination(data.total);
                    }
                })
                .catch(err => console.error('Error:', err));
        }

        function updateStatistics(stats) {
            document.getElementById('totalNotifications').textContent = stats.total;
            document.getElementById('totalEmails').textContent = stats.total_emails;
            document.getElementById('totalSMS').textContent = stats.total_sms;
            document.getElementById('totalSent').textContent = stats.total_sent;
            document.getElementById('totalFailed').textContent = stats.total_failed;
        }

        function displayNotifications(notifications) {
            const tbody = document.getElementById('notificationsTable');
            
            if (notifications.length === 0) {
                tbody.innerHTML = '<tr><td colspan="7" class="text-center py-8" style="color: var(--text-secondary)">No notifications found</td></tr>';
                return;
            }
            
            tbody.innerHTML = notifications.map(n => `
                <tr class="border-b hover:bg-gray-50 dark:hover:bg-gray-800" style="border-color: var(--border-color)">
                    <td class="py-3 px-4">${n.id}</td>
                    <td class="py-3 px-4">
                        <span class="type-${n.type}">
                            <i class="fas fa-${n.type === 'email' ? 'envelope' : 'sms'} mr-1"></i>${n.type.toUpperCase()}
                        </span>
                    </td>
                    <td class="py-3 px-4">${n.recipient}</td>
                    <td class="py-3 px-4">
                        <div class="max-w-xs truncate">${n.subject || n.message.substring(0, 50) + '...'}</div>
                    </td>
                    <td class="py-3 px-4">
                        <span class="status-${n.status} font-semibold">
                            <i class="fas fa-${n.status === 'sent' ? 'check' : 'times'}-circle mr-1"></i>${n.status.toUpperCase()}
                        </span>
                    </td>
                    <td class="py-3 px-4">${new Date(n.sent_at).toLocaleString()}</td>
                    <td class="py-3 px-4">
                        <button onclick="viewDetails(${n.id})" class="text-blue-600 hover:underline">
                            <i class="fas fa-eye"></i>
                        </button>
                    </td>
                </tr>
            `).join('');
        }

        function updatePagination(total) {
            totalPages = Math.ceil(total / limit);
            document.getElementById('pageInfo').textContent = `Page ${currentPage} of ${totalPages}`;
            document.getElementById('prevBtn').disabled = currentPage === 1;
            document.getElementById('nextBtn').disabled = currentPage === totalPages;
        }

        function applyFilters() {
            currentPage = 1;
            loadNotifications();
        }

        function previousPage() {
            if (currentPage > 1) {
                currentPage--;
                loadNotifications();
            }
        }

        function nextPage() {
            if (currentPage < totalPages) {
                currentPage++;
                loadNotifications();
            }
        }

        function viewDetails(id) {
            alert('View details for notification ID: ' + id);
        }

        // Test Email Modal
        function showTestEmailModal() {
            document.getElementById('testEmailModal').classList.remove('hidden');
            document.getElementById('testEmailModal').classList.add('flex');
        }

        function closeTestEmailModal() {
            document.getElementById('testEmailModal').classList.add('hidden');
            document.getElementById('testEmailModal').classList.remove('flex');
        }

        function sendTestEmail() {
            const type = document.getElementById('testEmailType').value;
            const email = document.getElementById('testEmailRecipient').value;
            
            if (!email) {
                alert('Please enter recipient email');
                return;
            }
            
            fetch('api/send_test_email.php', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ email_type: type, recipient_email: email })
            })
            .then(res => res.json())
            .then(data => {
                alert(data.message);
                if (data.success) {
                    closeTestEmailModal();
                    loadNotifications();
                }
            })
            .catch(err => alert('Error: ' + err));
        }

        // Test SMS Modal
        function showTestSMSModal() {
            document.getElementById('testSMSModal').classList.remove('hidden');
            document.getElementById('testSMSModal').classList.add('flex');
        }

        function closeTestSMSModal() {
            document.getElementById('testSMSModal').classList.add('hidden');
            document.getElementById('testSMSModal').classList.remove('flex');
        }

        function sendTestSMS() {
            const type = document.getElementById('testSMSType').value;
            const phone = document.getElementById('testSMSRecipient').value;
            
            if (!phone || phone.length !== 10) {
                alert('Please enter valid 10-digit phone number');
                return;
            }
            
            fetch('api/send_test_sms.php', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ sms_type: type, recipient_phone: phone })
            })
            .then(res => res.json())
            .then(data => {
                alert(data.message);
                if (data.success) {
                    closeTestSMSModal();
                    loadNotifications();
                }
            })
            .catch(err => alert('Error: ' + err));
        }

        // Load on page load
        loadNotifications();
    </script>
</body>
</html>
