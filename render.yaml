

services:
  # 2. Node.js Backend API
  - type: web
    name: gov-eservices-api
    env: node
    plan: free
    buildCommand: "cd backend && npm install && npm run prisma:generate && npm run prisma:push && npm run seed"
    startCommand: "cd backend && npm start"
    envVars:
      - key: NODE_ENV
        value: production
      - key: DATABASE_URL
        value: "postgresql://neondb_owner:npg_jZkAN9ars6MS@ep-shy-meadow-at60n6a6-pooler.c-9.us-east-1.aws.neon.tech/neondb?sslmode=require&channel_binding=require"
      - key: JWT_SECRET
        generateValue: true
      - key: FRONTEND_URL
        value: "https://gov-eservices-portal.onrender.com" # Will update once frontend is deployed

  # 3. React Frontend (Static Site)
  - type: web
    name: gov-eservices-portal
    env: static
    buildCommand: "cd frontend && npm install && npm run build"
    staticPublishPath: "./frontend/dist"
    envVars:
      - key: VITE_API_URL
        value: "https://gov-eservices-api.onrender.com/api"
    routes:
      - type: rewrite
        source: /*
        destination: /index.html
