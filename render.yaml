databases:
  # 1. PostgreSQL Database
  - name: gov-eservices-db
    databaseName: gov_eservices
    user: admin
    region: singapore # Change as needed based on your users
    plan: free

services:
  # 2. Node.js Backend API
  - type: web
    name: gov-eservices-api
    env: node
    plan: free
    region: singapore
    buildCommand: "cd backend && npm install && npm run prisma:generate && npm run prisma:push && npm run seed"
    startCommand: "cd backend && npm start"
    envVars:
      - key: NODE_ENV
        value: production
      - key: DATABASE_URL
        fromDatabase:
          name: gov-eservices-db
          property: connectionString
      - key: JWT_SECRET
        generateValue: true
      - key: FRONTEND_URL
        value: "https://gov-eservices-portal.onrender.com" # Will update once frontend is deployed

  # 3. React Frontend (Static Site)
  - type: web
    name: gov-eservices-portal
    env: static
    plan: free
    buildCommand: "cd frontend && npm install && npm run build"
    staticPublishPath: "./frontend/dist"
    envVars:
      - key: VITE_API_URL
        value: "https://gov-eservices-api.onrender.com/api"
    routes:
      - type: rewrite
        source: /*
        destination: /index.html
